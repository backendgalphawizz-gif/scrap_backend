name: Production SSH Deploy

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          server-dir: ./
          script: |
            # cd /home/developmentalpha/deendari.developmentalphawizz.com
            
            # 1. GitHub se naya code aur pehle se bani hui build files lein
            # git fetch origin main
            # git reset --hard origin/main
            
            # 2. PHP dependencies update karein (Agar composer.json badla hai)
            # Agar composer nahi chalta toh is line ko remove kar sakte hain
            composer install --no-dev --optimize-autoloader --no-interaction || echo "Composer skip"

            # 3. Laravel ka cache clear karein (TAAKI NAYI FILES DIKHEIN)
            php artisan optimize:clear
            php artisan config:cache
            php artisan view:cache
            
            # 4. Verify karein ki build folder maujood hai
            # echo "Current Build Status:"
            # ls -la public/build/manifest.json
            
            echo "🚀 Website Updated Successfully!"
